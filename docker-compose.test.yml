# Banco de teste do QA-03 — Postgres igual ao de produção (Supabase é PG).
#
#   docker compose -f docker-compose.test.yml up -d
#   composer db:test      # roda as migrations no banco de teste
#   composer test         # a suíte inteira (feature + unit)
#
# Porta 55432 de propósito: não colide com um Postgres local na 5432.
# Sem este container no ar, os testes de feature se auto-skipam.
services:
  db:
    image: postgres:16-alpine
    container_name: yve_test_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
      POSTGRES_DB: yve_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

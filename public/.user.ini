; Limites de upload — necessários para o relay de conteúdos pro Google Drive.
; O arquivo da cliente passa pelo PHP antes de ir pro Drive (fallback ao CORS).
; A Hostinger pode aplicar um teto próprio; ajuste conforme o plano permitir.
upload_max_filesize = 1024M
post_max_size = 1056M
memory_limit = 256M
max_execution_time = 3600
max_input_time = 3600
